<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: system-ui, -apple-system, sans-serif; background: #f7f7f7; color: #222; }

    .header {
      background: #ee4d2d; color: #fff;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .header span { font-size: 15px; font-weight: 700; }

    .body { padding: 16px; }

    .msg { padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }
    .msg.ok { background: #dcfce7; color: #15803d; }
    .msg.err { background: #fee2e2; color: #dc2626; }
    .msg.info { background: #fff7ed; color: #c2410c; }

    label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 4px; text-transform: uppercase; }

    input, textarea {
      width: 100%; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; font-family: inherit;
      outline: none; background: #fff;
      margin-bottom: 10px;
    }
    input:focus, textarea:focus { border-color: #ee4d2d; box-shadow: 0 0 0 2px rgba(238,77,45,.1); }
    textarea { resize: none; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .img-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .thumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; background: #eee; flex-shrink: 0; border: 1px solid #e0e0e0; }
    .thumb-placeholder { width: 56px; height: 56px; border-radius: 10px; background: #eee; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid #e0e0e0; }
    .img-row > div { flex: 1; }
    .img-row input { margin-bottom: 0; }

    button {
      width: 100%; padding: 10px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: #ee4d2d; color: #fff; transition: background .15s;
    }
    button:hover:not(:disabled) { background: #d73211; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.secondary {
      background: #fff; color: #666; border: 1px solid #ddd; font-weight: 600;
      margin-top: 6px;
    }
    button.secondary:hover:not(:disabled) { background: #f5f5f5; }

    .setup-note { font-size: 12px; color: #999; margin-top: 8px; line-height: 1.5; }

    #loading { text-align: center; padding: 24px 0; color: #999; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <span>🛍️ Shopee Affiliate</span>
  </div>
  <div class="body" id="root"></div>
  <script src="popup.js"></script>
</body>
</html>
